version: '3.8'

services:
  # Ollama LLM 服务
  ollama:
    image: ollama/ollama:latest
    container_name: audit-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI 后端服务
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: audit-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./services:/app/services
      - ./storage:/app/storage
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen3.5:0.8b
      - AUDIT_DATA_DIR=/app/data
      - EMBED_DEVICE=cuda
      - MINERU_DEVICE_MODE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audit-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=/api/v1
    depends_on:
      - api
    restart: unless-stopped

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:latest
    container_name: audit-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    profiles:
      - with-nginx

volumes:
  ollama_data:

networks:
  default:
    name: audit-network
