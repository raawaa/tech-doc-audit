version: '3.8'

services:
  # Ollama LLM 服务
  ollama:
    image: ollama/ollama:latest
    container_name: audit-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PageIndex 服务
  pageindex:
    build:
      context: ./services/pageindex
      dockerfile: Dockerfile
    container_name: audit-pageindex
    ports:
      - "8584:8584"
    volumes:
      - pageindex_data:/root/.pageindex
      - ./data/documents:/data/documents
    environment:
      - OPENAI_API_BASE=http://ollama:11434/v1
      - OPENAI_API_KEY=sk-dummy
      - LLM_MODEL_NAME=qwen3.5:0.8b
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  pageindex_data:

networks:
  default:
    name: audit-network